<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beta Ticket | Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
        }

        .input-premium {
            width: 100%;
            background-color: #ffffff;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 1rem 1.25rem;
            font-weight: 700;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-premium:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* --- NUEVO DISEÑO DE AUTOCOMPLETADO --- */
        .suggestion-wrapper {
            position: relative;
        }

        .suggestion-container {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-top: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            z-index: 100;
            display: none;
            overflow: hidden;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .suggestion-item {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }

        .suggestion-item:last-child { border-bottom: none; }

        .suggestion-item:hover {
            background-color: #f0f7ff;
            color: #2563eb;
            padding-left: 20px;
        }

        .suggestion-item::before {
            content: '🔍';
            margin-right: 10px;
            font-size: 10px;
            opacity: 0.5;
        }

        /* Estilos generales */
        .check-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .check-card {
            background: white; border: 2px solid #f1f5f9; padding: 12px; border-radius: 14px;
            display: flex; align-items: center; cursor: pointer; transition: all 0.2s;
        }
        .check-card span { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; }
        .check-card:has(input:checked) { border-color: #3b82f6; background-color: #eff6ff; }
        .label-style { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <div class="max-w-xl mx-auto p-4 py-8">
        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 p-6 md:p-10">
            
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-3xl font-[900] text-blue-600 italic leading-none tracking-tighter uppercase">Beta Ticket</h1>
                    <p class="text-[9px] font-black text-green-500 tracking-[0.2em] mt-1 uppercase">● Live Database Sync</p>
                </div>
                <div class="text-right">
                    <span class="label-style">Fecha</span>
                    <input type="date" id="fecha_atencion" class="bg-slate-50 border-none rounded-xl p-2 text-xs font-bold text-slate-600 outline-none">
                </div>
            </header>

            <form id="incidentForm" class="space-y-6">
                
                <div class="relative">
                    <span class="label-style">Personal a Cargo</span>
                    <select id="tecnico" required class="input-premium appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207.5L10%2012.5L15%207.5%22%20stroke%3D%22%2394A3B8%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')] bg-[length:20px] bg-[right_1.25rem_center] bg-no-repeat">
                        <option value="" disabled selected>Seleccione el técnico...</option>
                        <option>Adriel Aizpurua</option>
                        <option>Ellery Mendoza</option>
                        <option>Axel De Leon</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="suggestion-wrapper">
                        <span class="label-style">Nombre del Cliente</span>
                        <input type="text" id="cliente" autocomplete="off" required placeholder="Buscar cliente..." class="input-premium">
                        <div id="suggest-cliente" class="suggestion-container"></div>
                    </div>
                    <div class="suggestion-wrapper">
                        <span class="label-style">Número de Serie</span>
                        <input type="text" id="sn_equipo" autocomplete="off" required placeholder="S/N" class="input-premium">
                        <div id="suggest-serie" class="suggestion-container"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="suggestion-wrapper">
                        <span class="label-style">Abastecedor CIT</span>
                        <input type="text" id="abastecedor" autocomplete="off" placeholder="Opcional..." class="input-premium">
                        <div id="suggest-abastecedor" class="suggestion-container"></div>
                    </div>
                    <div class="suggestion-wrapper">
                        <span class="label-style">Atención A</span>
                        <input type="text" id="atencion_a" autocomplete="off" placeholder="Recibe..." class="input-premium">
                        <div id="suggest-atencion" class="suggestion-container"></div>
                    </div>
                </div>

                <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                    <span class="label-style text-center mb-5 block">Fallas Concurrentes</span>
                    <div class="check-group mb-4">
                        <label class="check-card"><input type="checkbox" name="falla" value="Bolsa no Liberó" class="mr-2"><span>Bolsa no Liberó</span></label>
                        <label class="check-card"><input type="checkbox" name="falla" value="CIT Caído" class="mr-2"><span>CIT Caído</span></label>
                        <label class="check-card"><input type="checkbox" name="falla" value="Atasco" class="mr-2"><span>Atasco</span></label>
                        <label class="check-card"><input type="checkbox" name="falla" value="Bolsa Llena" class="mr-2"><span>Bolsa Llena</span></label>
                    </div>
                </div>

                <div>
                    <span class="label-style">Resolución del Ticket</span>
                    <textarea id="solucion" rows="3" required placeholder="Detalle técnico..." class="input-premium resize-none"></textarea>
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-blue-700 transition-all uppercase tracking-widest text-sm">Guardar Registro</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://visznzzesyveymnlfbpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc3puenplc3l2ZXltbmxmYnBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDU4NTUsImV4cCI6MjA5MDU4MTg1NX0.FItuISXRPOJIXazRPKJbOl1MQ8n3P1McRauPX51nci8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cacheData = { clientes: [], series: [], abastecedores: [], atenciones: [] };

        // Función para cargar datos únicos desde Supabase
        async function fetchCache() {
            try {
                const { data, error } = await _supabase.from('incidencias').select('cliente, sn_equipo, abastecedor, atencion_a').limit(200);
                if (data) {
                    cacheData.clientes = [...new Set(data.map(i => i.cliente).filter(Boolean))];
                    cacheData.series = [...new Set(data.map(i => i.sn_equipo).filter(Boolean))];
                    cacheData.abastecedores = [...new Set(data.map(i => i.abastecedor).filter(Boolean))];
                    cacheData.atenciones = [...new Set(data.map(i => i.atencion_a).filter(Boolean))];
                }
            } catch (e) { console.error("Error cargando caché:", e); }
        }

        // Lógica de Autocompletado Mejorada
        function setupSuggest(inputId, boxId, key) {
            const input = document.getElementById(inputId);
            const box = document.getElementById(boxId);

            input.addEventListener('input', () => {
                const val = input.value.toUpperCase();
                box.innerHTML = '';
                
                if (val.length < 1) { 
                    box.style.display = 'none'; 
                    return; 
                }

                // Filtrar coincidencias
                const matches = cacheData[key]
                    .filter(i => i.toUpperCase().includes(val))
                    .sort((a, b) => a.indexOf(val) - b.indexOf(val)) // Priorizar si empieza con la letra
                    .slice(0, 6);

                if (matches.length > 0) {
                    matches.forEach(m => {
                        const item = document.createElement('div');
                        item.className = 'suggestion-item';
                        item.textContent = m;
                        // Evento al hacer click
                        item.onmousedown = (e) => {
                            e.preventDefault();
                            input.value = m;
                            box.style.display = 'none';
                        };
                        box.appendChild(item);
                    });
                    box.style.display = 'block';
                } else {
                    box.style.display = 'none';
                }
            });

            // Cerrar al perder foco
            input.addEventListener('blur', () => {
                setTimeout(() => box.style.display = 'none', 200);
            });
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('fecha_atencion').value = new Date().toISOString().split('T')[0];
            
            await fetchCache();

            // Activar autocompletado en los campos
            setupSuggest('cliente', 'suggest-cliente', 'clientes');
            setupSuggest('sn_equipo', 'suggest-serie', 'series');
            setupSuggest('abastecedor', 'suggest-abastecedor', 'abastecedores');
            setupSuggest('atencion_a', 'suggest-atencion', 'atenciones');
        });

        // Manejo del Submit (Igual al original)
        document.getElementById('incidentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = 'GUARDANDO...';

            const fallas = Array.from(document.querySelectorAll('input[name="falla"]:checked')).map(el => el.value);

            const { error } = await _supabase.from('incidencias').insert([{
                tecnico: document.getElementById('tecnico').value,
                cliente: document.getElementById('cliente').value.toUpperCase(),
                sn_equipo: document.getElementById('sn_equipo').value.toUpperCase(),
                abastecedor: document.getElementById('abastecedor').value.toUpperCase() || null,
                atencion_a: document.getElementById('atencion_a').value.toUpperCase() || null,
                fallas: fallas,
                solucion: document.getElementById('solucion').value.toUpperCase(),
                fecha_manual: document.getElementById('fecha_atencion').value
            }]);

            if (!error) {
                alert("✓ REGISTRO EXITOSO");
                location.reload();
            } else {
                alert("Error: " + error.message);
                btn.disabled = false; btn.innerText = 'Guardar Registro';
            }
        });
    </script>
</body>
</html>
