<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beta Ticket Management | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* FIX: Sugerencias con visibilidad absoluta */
        .suggestion-box {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 9999 !important; /* Prioridad máxima */
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            margin-top: 5px;
            box-shadow: 0 15px 30px -5px rgba(0,0,0,0.15);
            max-height: 220px;
            overflow-y: auto;
            display: none;
        }
        .suggestion-item {
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 800;
            color: #1e293b;
            cursor: pointer;
            border-bottom: 1px solid #f8fafc;
            text-transform: uppercase;
        }
        .suggestion-item:hover { background: #f1f5f9; color: #2563eb; }
        .suggestion-item:last-child { border-bottom: none; }

        .glass-card { background: white; transition: all 0.3s ease; }
        .admin-label { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
        
        /* Estilo para los checks */
        .check-card {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .check-card:active { transform: scale(0.97); background: #f8fafc; }
        
        #admin-modal, #pin-modal { display: none; opacity: 0; transition: all 0.3s ease; z-index: 500; }
        #admin-modal.active, #pin-modal.active { display: flex; opacity: 1; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .animate-blink { animation: blink 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="toast-container" class="fixed top-5 right-5 z-[1000] flex flex-col gap-3"></div>

    <div id="main-app" class="glass-card w-full max-w-2xl rounded-[2.5rem] shadow-2xl p-6 md:p-10 border border-slate-200">
        <header class="mb-8">
            <div class="flex justify-between items-start mb-6">
                <div id="logo-btn" class="cursor-pointer active:scale-95 transition-transform">
                    <h1 class="text-3xl font-black text-blue-600 tracking-tighter italic uppercase leading-none">Beta Ticket</h1>
                    <div class="flex items-center space-x-2 mt-1">
                        <div class="h-2 w-2 rounded-full bg-green-500 animate-blink"></div>
                        <span class="text-[10px] font-black text-green-600 uppercase tracking-widest">Management System</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="admin-label">Fecha Atención</span>
                    <input type="date" id="fecha_atencion" class="bg-slate-100 border-none rounded-lg p-2 text-xs font-bold text-slate-700 outline-none">
                </div>
            </div>
            <hr class="border-slate-100">
        </header>

        <form id="incidentForm" class="space-y-6">
            <div>
                <span class="admin-label">Personal a Cargo</span>
                <select id="tecnico" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-slate-700 focus:ring-2 focus:ring-blue-500 transition-all appearance-none">
                    <option value="" disabled selected>Seleccione el técnico...</option>
                    <option>Adriel Aizpurua</option>
                    <option>Ellery Mendoza</option>
                    <option>Axel De Leon</option>
                </select>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                    <span class="admin-label">Nombre del Cliente</span>
                    <input type="text" id="cliente" autocomplete="off" required placeholder="Ej: Novey" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-slate-700 focus:ring-2 focus:ring-blue-500">
                    <div id="suggest-cliente" class="suggestion-box"></div>
                </div>
                <div class="relative">
                    <span class="admin-label">Número de Serie</span>
                    <input type="text" id="sn_equipo" autocomplete="off" required placeholder="S/N del equipo" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-slate-700 focus:ring-2 focus:ring-blue-500">
                    <div id="suggest-serie" class="suggestion-box"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                    <span class="admin-label">Abastecedor CIT</span>
                    <input type="text" id="abastecedor" autocomplete="off" placeholder="Opcional..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-slate-700 focus:ring-2 focus:ring-blue-500">
                    <div id="suggest-abastecedor" class="suggestion-box"></div>
                </div>
                <div class="relative">
                    <span class="admin-label">Atención A</span>
                    <input type="text" id="atencion_a" autocomplete="off" placeholder="Quien recibe..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-slate-700 focus:ring-2 focus:ring-blue-500">
                    <div id="suggest-atencion" class="suggestion-box"></div>
                </div>
            </div>
            
            <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-200">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-4 text-center tracking-widest">Fallas Concurrentes</p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
                    <label class="check-card"><input type="checkbox" name="falla" value="Bolsa no Liberó" class="w-4 h-4 text-blue-600 mr-3"><span class="text-[10px] font-black text-slate-600 uppercase">Bolsa no Liberó</span></label>
                    <label class="check-card"><input type="checkbox" name="falla" value="CIT Caído" class="w-4 h-4 text-blue-600 mr-3"><span class="text-[10px] font-black text-slate-600 uppercase">CIT Caído</span></label>
                    <label class="check-card"><input type="checkbox" name="falla" value="Atasco" class="w-4 h-4 text-blue-600 mr-3"><span class="text-[10px] font-black text-slate-600 uppercase">Atasco</span></label>
                    <label class="check-card"><input type="checkbox" name="falla" value="Bolsa Llena" class="w-4 h-4 text-blue-600 mr-3"><span class="text-[10px] font-black text-slate-600 uppercase">Bolsa Llena</span></label>
                    <label class="check-card sm:col-span-2 border-blue-200 bg-blue-50/50">
                        <input type="checkbox" name="falla" value="Restablecer estado de falla" class="w-4 h-4 text-blue-600 mr-3">
                        <span class="text-[10px] font-black text-blue-700 uppercase">Restablecer estado de falla</span>
                    </label>
                </div>
                <div class="pt-2 border-t border-slate-200 mt-4">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" id="checkOtro" name="falla" value="Otro" class="w-4 h-4 text-orange-500">
                        <span class="text-[10px] font-black text-slate-400 uppercase italic">Otra falla específica</span>
                    </label>
                    <input type="text" id="detalleOtro" class="hidden w-full mt-3 p-4 bg-white border border-orange-200 rounded-xl outline-none text-xs font-bold uppercase" placeholder="Escriba la falla detectada...">
                </div>
            </div>

            <div>
                <span class="admin-label">Resolución del Ticket</span>
                <textarea id="solucion" rows="3" required placeholder="Describa la solución técnica aplicada..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none resize-none font-bold text-slate-700 focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            
            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition-all uppercase tracking-widest text-sm">Guardar Registro Técnico</button>
        </form>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[3rem] w-[320px] text-center shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 uppercase mb-6">Acceso Admin</h3>
            <div id="pin-dots" class="flex justify-center gap-4 mb-8">
                <div class="w-3 h-3 rounded-full border-2 border-slate-200" id="dot-0"></div>
                <div class="w-3 h-3 rounded-full border-2 border-slate-200" id="dot-1"></div>
                <div class="w-3 h-3 rounded-full border-2 border-slate-200" id="dot-2"></div>
                <div class="w-3 h-3 rounded-full border-2 border-slate-200" id="dot-3"></div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <button onclick="pressNum('1')" class="h-14 bg-slate-50 rounded-full font-black">1</button>
                <button onclick="pressNum('2')" class="h-14 bg-slate-50 rounded-full font-black">2</button>
                <button onclick="pressNum('3')" class="h-14 bg-slate-50 rounded-full font-black">3</button>
                <button onclick="pressNum('4')" class="h-14 bg-slate-50 rounded-full font-black">4</button>
                <button onclick="pressNum('5')" class="h-14 bg-slate-50 rounded-full font-black">5</button>
                <button onclick="pressNum('6')" class="h-14 bg-slate-50 rounded-full font-black">6</button>
                <button onclick="pressNum('7')" class="h-14 bg-slate-50 rounded-full font-black">7</button>
                <button onclick="pressNum('8')" class="h-14 bg-slate-50 rounded-full font-black">8</button>
                <button onclick="pressNum('9')" class="h-14 bg-slate-50 rounded-full font-black">9</button>
                <button onclick="clearPin()" class="text-red-500 font-black text-[10px]">BORRAR</button>
                <button onclick="pressNum('0')" class="h-14 bg-slate-50 rounded-full font-black">0</button>
                <button onclick="closePin()" class="text-slate-400 font-black text-[10px]">SALIR</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://visznzzesyveymnlfbpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc3puenplc3l2ZXltbmxmYnBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDU4NTUsImV4cCI6MjA5MDU4MTg1NX0.FItuISXRPOJIXazRPKJbOl1MQ8n3P1McRauPX51nci8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentPin = "";
        const MASTER_PIN = "2026";
        let cacheData = { clientes: [], series: [], abastecedores: [], atenciones: [] };

        function getLocalPanamaDate() {
            const date = new Date();
            return new Date(date.getTime() - (date.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        }

        async function fetchSugerencias() {
            console.log("Actualizando caché de sugerencias...");
            const { data, error } = await _supabase.from('incidencias').select('cliente, sn_equipo, abastecedor, atencion_a');
            if (!error && data) {
                cacheData.clientes = [...new Set(data.map(i => i.cliente).filter(Boolean))];
                cacheData.series = [...new Set(data.map(i => i.sn_equipo).filter(Boolean))];
                cacheData.abastecedores = [...new Set(data.map(i => i.abastecedor).filter(Boolean))];
                cacheData.atenciones = [...new Set(data.map(i => i.atencion_a).filter(Boolean))];
            }
        }

        // FIX: Lógica de autocompletado reconstruida para mayor fiabilidad
        function setupAutoSuggest(inputId, boxId, dataKey) {
            const input = document.getElementById(inputId);
            const box = document.getElementById(boxId);

            input.addEventListener('input', () => {
                const val = input.value.toUpperCase().trim();
                box.innerHTML = '';
                
                if (val.length < 1) {
                    box.style.display = 'none';
                    return;
                }

                const matches = cacheData[dataKey].filter(item => 
                    String(item).toUpperCase().includes(val)
                ).slice(0, 5);

                if (matches.length > 0) {
                    matches.forEach(match => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.textContent = match;
                        div.onmousedown = (e) => { // Usamos mousedown para que se ejecute antes del blur
                            input.value = match;
                            box.style.display = 'none';
                        };
                        box.appendChild(div);
                    });
                    box.style.display = 'block';
                } else {
                    box.style.display = 'none';
                }
            });

            input.addEventListener('blur', () => {
                setTimeout(() => { box.style.display = 'none'; }, 200);
            });
        }

        // Pin Logic
        let logoPressTimer;
        const logoBtn = document.getElementById('logo-btn');
        logoBtn.addEventListener('mousedown', () => logoPressTimer = setTimeout(() => {
            currentPin = "";
            updatePinDots();
            document.getElementById('pin-modal').classList.add('active');
        }, 2000));
        logoBtn.addEventListener('mouseup', () => clearTimeout(logoPressTimer));

        function pressNum(n) {
            if(currentPin.length < 4) {
                currentPin += n;
                updatePinDots();
                if(currentPin.length === 4) {
                    if(currentPin === MASTER_PIN) alert("Acceso concedido (Panel Admin en desarrollo)"); 
                    else { alert("PIN Incorrecto"); clearPin(); }
                }
            }
        }
        function updatePinDots() {
            for(let i=0; i<4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.style.background = i < currentPin.length ? '#2563eb' : 'transparent';
                dot.style.borderColor = i < currentPin.length ? '#2563eb' : '#e2e8f0';
            }
        }
        function clearPin() { currentPin = ""; updatePinDots(); }
        function closePin() { document.getElementById('pin-modal').classList.remove('active'); }

        // Form Submission
        document.getElementById('incidentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = 'GUARDANDO...';

            const fallas = Array.from(document.querySelectorAll('input[name="falla"]:checked'))
                .map(el => el.value === 'Otro' ? `OTRO: ${document.getElementById('detalleOtro').value}` : el.value);

            const payload = {
                tecnico: document.getElementById('tecnico').value,
                cliente: document.getElementById('cliente').value.toUpperCase(),
                sn_equipo: document.getElementById('sn_equipo').value.toUpperCase(),
                abastecedor: document.getElementById('abastecedor').value.toUpperCase() || null,
                atencion_a: document.getElementById('atencion_a').value.toUpperCase() || null,
                fallas: fallas,
                solucion: document.getElementById('solucion').value.toUpperCase(),
                fecha_manual: document.getElementById('fecha_atencion').value || getLocalPanamaDate()
            };

            const { error } = await _supabase.from('incidencias').insert([payload]);

            if(!error) {
                alert("REGISTRO TÉCNICO GUARDADO");
                localStorage.setItem('saved_tech', payload.tecnico);
                location.reload(); // Recarga para limpiar y refrescar caché
            } else {
                alert("Error al guardar: " + error.message);
                btn.disabled = false;
                btn.innerText = 'Guardar Registro Técnico';
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('fecha_atencion').value = getLocalPanamaDate();
            const last = localStorage.getItem('saved_tech');
            if(last) document.getElementById('tecnico').value = last;

            await fetchSugerencias();
            
            setupAutoSuggest('cliente', 'suggest-cliente', 'clientes');
            setupAutoSuggest('sn_equipo', 'suggest-serie', 'series');
            setupAutoSuggest('abastecedor', 'suggest-abastecedor', 'abastecedores');
            setupAutoSuggest('atencion_a', 'suggest-atencion', 'atenciones');

            document.getElementById('checkOtro').addEventListener('change', (e) => {
                document.getElementById('detalleOtro').classList.toggle('hidden', !e.target.checked);
            });
        });
    </script>
</body>
</html>
