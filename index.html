<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beta Ticket Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        .glass-card { background: white; transition: all 0.3s ease; }
        #admin-modal, #pin-modal { display: none; opacity: 0; transition: all 0.3s ease; }
        #admin-modal.active, #pin-modal.active { display: flex; opacity: 1; }
        #logo-btn { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .animate-blink { animation: blink 1.5s infinite; }
        
        /* Estilos PIN */
        .pin-dot { width: 14px; height: 14px; border: 2px solid #cbd5e1; border-radius: 50%; transition: all 0.2s; }
        .pin-dot.filled { background: #2563eb; border-color: #2563eb; transform: scale(1.2); }
        .num-btn { width: 65px; height: 65px; display: flex; items-center; justify-center; border-radius: 50%; background: #f8fafc; font-weight: 900; font-size: 1.2rem; transition: all 0.1s; border: 1px solid #f1f5f9; color: #1e293b; }
        .num-btn:active { background: #e2e8f0; transform: scale(0.9); }

        /* Toast Styles */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { min-width: 280px; padding: 14px; border-radius: 1rem; background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-left: 5px solid #cbd5e1; }
        .toast.active { transform: translateX(0); }
        .toast-success { border-left-color: #10b981; }
        .toast-error { border-left-color: #ef4444; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div id="toast-container"></div>

    <div id="main-app" class="glass-card w-full max-w-2xl rounded-[2.5rem] shadow-2xl p-8 md:p-10 border border-slate-200">
        <header class="mb-8">
            <div class="flex justify-between items-start mb-6">
                <div id="logo-btn" class="cursor-pointer active:scale-95 transition-transform">
                    <h1 class="text-3xl font-black text-blue-600 tracking-tighter italic uppercase">Beta Ticket</h1>
                    <div class="flex items-center space-x-2 mt-1">
                        <div class="h-2 w-2 rounded-full bg-green-500 animate-blink"></div>
                        <span class="text-[10px] font-black text-green-600 uppercase tracking-widest">Management System</span>
                    </div>
                </div>
                <div class="flex flex-col items-end">
                    <label class="text-[9px] font-black text-slate-400 uppercase mb-1 mr-1">Fecha de Atención</label>
                    <input type="date" id="fecha_atencion" class="bg-slate-100 text-slate-700 font-bold text-xs p-2.5 rounded-xl border border-slate-200 outline-none">
                </div>
            </div>
            <hr class="border-slate-100">
        </header>

        <form id="incidentForm" class="space-y-5">
            <select id="tecnico" required class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-medium text-slate-700">
                <option value="" disabled selected>Seleccione Técnico...</option>
                <option>Adriel Aizpurua</option>
                <option>Ellery Mendoza</option>
                <option>Axel De Leon</option>
            </select>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="cliente" list="list-cliente" required placeholder="Cliente" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-medium">
                <input type="text" id="sn_equipo" list="list-sn" required placeholder="S/N Equipo" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-medium">
            </div>
            <textarea id="solucion" rows="3" required placeholder="Solución técnica aplicada..." class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none resize-none font-medium"></textarea>
            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest text-sm">Guardar Registro</button>
        </form>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-xs text-center">
            <div class="mb-6">
                <div class="bg-blue-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
                <h3 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Acceso Admin</h3>
                <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Ingrese el código PIN</p>
            </div>

            <div class="flex justify-center gap-4 mb-8">
                <div class="pin-dot" id="dot-0"></div>
                <div class="pin-dot" id="dot-1"></div>
                <div class="pin-dot" id="dot-2"></div>
                <div class="pin-dot" id="dot-3"></div>
            </div>

            <div class="grid grid-cols-3 gap-4 justify-items-center">
                <button onclick="pressNum('1')" class="num-btn">1</button>
                <button onclick="pressNum('2')" class="num-btn">2</button>
                <button onclick="pressNum('3')" class="num-btn">3</button>
                <button onclick="pressNum('4')" class="num-btn">4</button>
                <button onclick="pressNum('5')" class="num-btn">5</button>
                <button onclick="pressNum('6')" class="num-btn">6</button>
                <button onclick="pressNum('7')" class="num-btn">7</button>
                <button onclick="pressNum('8')" class="num-btn">8</button>
                <button onclick="pressNum('9')" class="num-btn">9</button>
                <button onclick="clearPin()" class="num-btn text-red-500 font-bold text-xs uppercase">Borrar</button>
                <button onclick="pressNum('0')" class="num-btn">0</button>
                <button onclick="closePin()" class="num-btn text-slate-400 font-bold text-xs uppercase">Salir</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-50 flex items-center justify-center p-2 md:p-4">
        <div class="bg-white w-full max-w-7xl max-h-[98vh] rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 md:p-8 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-2xl font-black text-slate-800 uppercase italic">Beta <span class="text-blue-600">Admin</span></h2>
                <button onclick="closeAdmin()" class="bg-slate-100 p-3 rounded-full text-slate-400 hover:text-red-500 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-4 md:p-8 overflow-y-auto bg-slate-50 flex-1">
                <div id="admin-content-placeholder" class="text-center py-20 text-slate-400 font-bold uppercase tracking-widest">Cargando Panel Maestro...</div>
                <div id="admin-real-content" class="hidden">
                    <div id="record-count" class="text-4xl font-black text-blue-600 mb-4">0</div>
                    <div class="overflow-x-auto bg-white rounded-3xl border border-slate-200">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-800 text-white text-[10px] uppercase tracking-widest">
                                <tr><th class="p-4">Fecha</th><th class="p-4">Técnico</th><th class="p-4">Cliente</th><th class="p-4">Solución</th></tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <datalist id="list-cliente"></datalist>
    <datalist id="list-sn"></datalist>

    <script>
        const SUPABASE_URL = 'https://visznzzesyveymnlfbpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc3puenplc3l2ZXltbmxmYnBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDU4NTUsImV4cCI6MjA5MDU4MTg1NX0.FItuISXRPOJIXazRPKJbOl1MQ8n3P1McRauPX51nci8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentPin = "";
        const MASTER_PIN = "1234"; // Cambia tu PIN aquí
        let pressTimer;

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span class="font-black text-[10px] uppercase">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('active'), 10);
            setTimeout(() => { toast.classList.remove('active'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        // Lógica de Logo y PIN
        const logo = document.getElementById('logo-btn');
        logo.addEventListener('mousedown', () => pressTimer = setTimeout(openPinModal, 2000));
        logo.addEventListener('mouseup', () => clearTimeout(pressTimer));
        logo.addEventListener('touchstart', (e) => { e.preventDefault(); pressTimer = setTimeout(openPinModal, 2000); });
        logo.addEventListener('touchend', () => clearTimeout(pressTimer));

        function openPinModal() {
            currentPin = "";
            updatePinDots();
            document.getElementById('pin-modal').classList.add('active');
        }

        function closePin() { document.getElementById('pin-modal').classList.remove('active'); }

        function pressNum(num) {
            if(currentPin.length < 4) {
                currentPin += num;
                updatePinDots();
                if(currentPin.length === 4) {
                    setTimeout(validatePin, 200);
                }
            }
        }

        function updatePinDots() {
            for(let i=0; i<4; i++) {
                document.getElementById(`dot-${i}`).classList.toggle('filled', i < currentPin.length);
            }
        }

        function clearPin() { currentPin = ""; updatePinDots(); }

        function validatePin() {
            if(currentPin === MASTER_PIN) {
                closePin();
                openAdmin();
                showToast("Acceso Concedido", "success");
            } else {
                showToast("PIN Incorrecto", "error");
                currentPin = "";
                updatePinDots();
            }
        }

        function openAdmin() {
            document.getElementById('admin-modal').classList.add('active');
            loadAdminData();
        }

        function closeAdmin() { document.getElementById('admin-modal').classList.remove('active'); }

        async function loadAdminData() {
            const { data } = await _supabase.from('incidencias').select('*').order('created_at', { ascending: false });
            if(!data) return;
            document.getElementById('admin-content-placeholder').classList.add('hidden');
            document.getElementById('admin-real-content').classList.remove('hidden');
            document.getElementById('record-count').innerText = data.length;
            document.getElementById('table-body').innerHTML = data.map(row => `
                <tr class="border-b border-slate-50 hover:bg-slate-50">
                    <td class="p-4 font-bold text-blue-600 text-[10px]">${row.fecha_manual}</td>
                    <td class="p-4 text-xs font-bold text-slate-700">${row.tecnico}</td>
                    <td class="p-4 text-xs font-bold">${row.cliente}</td>
                    <td class="p-4 text-xs text-slate-500">${row.solucion}</td>
                </tr>
            `).join('');
        }

        // Envío de formulario
        document.getElementById('incidentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "GUARDANDO...";

            const payload = {
                tecnico: document.getElementById('tecnico').value,
                cliente: document.getElementById('cliente').value,
                sn_equipo: document.getElementById('sn_equipo').value,
                solucion: document.getElementById('solucion').value,
                fecha_manual: document.getElementById('fecha_atencion').value,
                fallas: ["Registro Directo"]
            };

            const { error } = await _supabase.from('incidencias').insert([payload]);
            if(!error) {
                showToast("Registro Guardado");
                e.target.reset();
                document.getElementById('fecha_atencion').value = new Date().toISOString().split('T')[0];
            } else {
                showToast("Error Supabase", "error");
            }
            btn.disabled = false; btn.innerText = "GUARDAR REGISTRO";
        });

        document.getElementById('fecha_atencion').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
