<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beta Ticket | Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }

        /* Estilo de Input Profesional */
        .input-premium {
            width: 100%;
            background-color: #ffffff;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 1rem 1.25rem;
            font-weight: 700;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            outline: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .input-premium:focus {
            border-color: #3b82f6;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Sugerencias Estilo App */
        .suggestion-container {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 18px;
            box-shadow: 0 12px 30px -10px rgba(0,0,0,0.15);
            z-index: 9999;
            overflow: hidden;
            display: none;
            animation: slideUp 0.2s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .suggestion-item {
            padding: 14px 20px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            color: #475569;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }

        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:active { background-color: #eff6ff; color: #2563eb; }

        /* Grid de Fallas */
        .check-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .check-card {
            background: white;
            border: 2px solid #f1f5f9;
            padding: 12px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .check-card input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            accent-color: #2563eb;
        }

        .check-card span {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
        }

        .check-card:has(input:checked) {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        .check-card:has(input:checked) span { color: #2563eb; }

        .label-style {
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            display: block;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <div class="max-w-xl mx-auto p-4 py-8">
        <div class="bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-slate-100 p-6 md:p-10">
            
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-3xl font-[900] text-blue-600 italic leading-none tracking-tighter uppercase">Beta Ticket</h1>
                    <p class="text-[9px] font-black text-green-500 tracking-[0.2em] mt-1 uppercase">● Management System</p>
                </div>
                <div class="text-right">
                    <span class="label-style">Fecha</span>
                    <input type="date" id="fecha_atencion" class="bg-slate-50 border-none rounded-xl p-2 text-xs font-bold text-slate-600 outline-none">
                </div>
            </header>

            <form id="incidentForm" class="space-y-6">
                
                <div class="relative">
                    <span class="label-style">Personal a Cargo</span>
                    <select id="tecnico" required class="input-premium appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%3E%3Cpath%20d%3D%22M5%207.5L10%2012.5L15%207.5%22%20stroke%3D%22%2394A3B8%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22/%3E%3C/svg%3E')] bg-[length:20px] bg-[right_1.25rem_center] bg-no-repeat">
                        <option value="" disabled selected>Seleccione el técnico...</option>
                        <option>Adriel Aizpurua</option>
                        <option>Ellery Mendoza</option>
                        <option>Axel De Leon</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="relative">
                        <span class="label-style">Nombre del Cliente</span>
                        <input type="text" id="cliente" autocomplete="off" required placeholder="Ej: BANCO GENERAL" class="input-premium">
                        <div id="suggest-cliente" class="suggestion-container"></div>
                    </div>
                    <div class="relative">
                        <span class="label-style">Número de Serie</span>
                        <input type="text" id="sn_equipo" autocomplete="off" required placeholder="S/N" class="input-premium">
                        <div id="suggest-serie" class="suggestion-container"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="relative">
                        <span class="label-style">Abastecedor CIT</span>
                        <input type="text" id="abastecedor" autocomplete="off" placeholder="Opcional..." class="input-premium">
                        <div id="suggest-abastecedor" class="suggestion-container"></div>
                    </div>
                    <div class="relative">
                        <span class="label-style">Atención A</span>
                        <input type="text" id="atencion_a" autocomplete="off" placeholder="Recibe..." class="input-premium">
                        <div id="suggest-atencion" class="suggestion-container"></div>
                    </div>
                </div>

                <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                    <span class="label-style text-center mb-5 block">Fallas Concurrentes</span>
                    <div class="check-group mb-4">
                        <label class="check-card"><input type="checkbox" name="falla" value="Bolsa no Liberó"><span>Bolsa no Liberó</span></label>
                        <label class="check-card"><input type="checkbox" name="falla" value="CIT Caído"><span>CIT Caído</span></label>
                        <label class="check-card"><input type="checkbox" name="falla" value="Atasco"><span>Atasco</span></label>
                        <label class="check-card"><input type="checkbox" name="falla" value="Bolsa Llena"><span>Bolsa Llena</span></label>
                        <label class="check-card col-span-2 border-blue-200 bg-white"><input type="checkbox" name="falla" value="Restablecer estado de falla"><span>Restablecer estado de falla</span></label>
                    </div>
                    <div class="flex items-center space-x-2 mt-4 px-2">
                        <input type="checkbox" id="checkOtro" name="falla" value="Otro" class="w-4 h-4">
                        <span class="text-[10px] font-bold text-slate-400 italic">Otra falla específica...</span>
                    </div>
                    <input type="text" id="detalleOtro" class="hidden input-premium mt-3 !py-3 !text-xs" placeholder="Especifique aquí...">
                </div>

                <div>
                    <span class="label-style">Resolución del Ticket</span>
                    <textarea id="solucion" rows="3" required placeholder="Detalle técnico de la solución..." class="input-premium resize-none"></textarea>
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-[0.98] transition-all uppercase tracking-widest text-sm">Guardar Registro</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://visznzzesyveymnlfbpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpc3puenplc3l2ZXltbmxmYnBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDU4NTUsImV4cCI6MjA5MDU4MTg1NX0.FItuISXRPOJIXazRPKJbOl1MQ8n3P1McRauPX51nci8';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cacheData = { clientes: [], series: [], abastecedores: [], atenciones: [] };

        async function fetchCache() {
            const { data } = await _supabase.from('incidencias').select('cliente, sn_equipo, abastecedor, atencion_a').limit(100);
            if (data) {
                cacheData.clientes = [...new Set(data.map(i => i.cliente).filter(Boolean))];
                cacheData.series = [...new Set(data.map(i => i.sn_equipo).filter(Boolean))];
                cacheData.abastecedores = [...new Set(data.map(i => i.abastecedor).filter(Boolean))];
                cacheData.atenciones = [...new Set(data.map(i => i.atencion_a).filter(Boolean))];
            }
        }

        function setupSuggest(inputId, boxId, key) {
            const input = document.getElementById(inputId);
            const box = document.getElementById(boxId);

            input.addEventListener('input', () => {
                const val = input.value.toUpperCase();
                box.innerHTML = '';
                if (!val) { box.style.display = 'none'; return; }

                const matches = cacheData[key].filter(i => i.toUpperCase().includes(val)).slice(0, 5);
                if (matches.length > 0) {
                    matches.forEach(m => {
                        const item = document.createElement('div');
                        item.className = 'suggestion-item';
                        item.textContent = m;
                        item.onmousedown = () => { input.value = m; box.style.display = 'none'; };
                        box.appendChild(item);
                    });
                    box.style.display = 'block';
                } else {
                    box.style.display = 'none';
                }
            });

            input.addEventListener('blur', () => setTimeout(() => box.style.display = 'none', 200));
        }

        document.getElementById('incidentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = 'PROCESANDO...';

            const fallas = Array.from(document.querySelectorAll('input[name="falla"]:checked'))
                .map(el => el.value === 'Otro' ? `OTRO: ${document.getElementById('detalleOtro').value}` : el.value);

            const { error } = await _supabase.from('incidencias').insert([{
                tecnico: document.getElementById('tecnico').value,
                cliente: document.getElementById('cliente').value.toUpperCase(),
                sn_equipo: document.getElementById('sn_equipo').value.toUpperCase(),
                abastecedor: document.getElementById('abastecedor').value.toUpperCase() || null,
                atencion_a: document.getElementById('atencion_a').value.toUpperCase() || null,
                fallas: fallas,
                solucion: document.getElementById('solucion').value.toUpperCase(),
                fecha_manual: document.getElementById('fecha_atencion').value || new Date().toISOString().split('T')[0]
            }]);

            if (!error) {
                alert("✓ REGISTRO GUARDADO");
                location.reload();
            } else {
                alert("Error: " + error.message);
                btn.disabled = false; btn.innerText = 'Guardar Registro';
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('fecha_atencion').value = new Date().toISOString().split('T')[0];
            await fetchCache();
            setupSuggest('cliente', 'suggest-cliente', 'clientes');
            setupSuggest('sn_equipo', 'suggest-serie', 'series');
            setupSuggest('abastecedor', 'suggest-abastecedor', 'abastecedores');
            setupSuggest('atencion_a', 'suggest-atencion', 'atenciones');
            
            document.getElementById('checkOtro').addEventListener('change', (e) => {
                document.getElementById('detalleOtro').classList.toggle('hidden', !e.target.checked);
            });
        });
    </script>
</body>
</html>
